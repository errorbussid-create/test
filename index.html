<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Activity Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen font-sans">

    <div class="max-w-5xl mx-auto px-4 py-8">
        <header class="border-b border-gray-800 pb-6 mb-8 text-center md:text-left">
            <h1 class="text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-teal-400 to-blue-500">
                Productivity Dashboard
            </h1>
            <p class="text-gray-400 text-sm mt-1">Track your daily grind and visualize your habits.</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="bg-gray-800 p-6 rounded-2xl border border-gray-700 shadow-xl h-fit">
                <h2 class="text-xl font-bold mb-4 text-teal-400">Log Today's Work</h2>
                <form id="activityForm" class="space-y-4">
                    <div>
                        <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-1">Date</label>
                        <input type="date" id="activityDate" required class="w-full bg-gray-900 border border-gray-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-teal-400">
                    </div>

                    <div>
                        <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-1">Category</label>
                        <select id="activityCategory" class="w-full bg-gray-900 border border-gray-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-teal-400">
                            <option value="Run">🏃‍♂️ Run</option>
                            <option value="Java">☕ Java</option>
                            <option value="Aptitude">🧠 Aptitude</option>
                            <option value="Reel">📱 Reel</option>
                        </select>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-1">Start Time</label>
                            <input type="time" id="startTime" required class="w-full bg-gray-900 border border-gray-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-teal-400">
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-1">End Time</label>
                            <input type="time" id="endTime" required class="w-full bg-gray-900 border border-gray-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-teal-400">
                        </div>
                    </div>

                    <button type="submit" class="w-full bg-gradient-to-r from-teal-500 to-blue-600 hover:from-teal-400 hover:to-blue-500 text-white font-semibold py-2.5 px-4 rounded-lg text-sm transition dynamic-shadow cursor-pointer">
                        Add Activity
                    </button>
                </form>
            </div>

            <div class="lg:col-span-2 space-y-8">
                <div class="bg-gray-800 p-6 rounded-2xl border border-gray-700 shadow-xl">
                    <h2 class="text-xl font-bold mb-4 text-blue-400">Weekly Overview (Hours)</h2>
                    <div class="relative h-64 w-full">
                        <canvas id="activityChart"></canvas>
                    </div>
                </div>

                <div class="bg-gray-800 p-6 rounded-2xl border border-gray-700 shadow-xl">
                    <h2 class="text-xl font-bold mb-4 text-gray-300">Activity Log</h2>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse text-sm">
                            <thead>
                                <tr class="border-b border-gray-700 text-gray-400">
                                    <th class="pb-3 font-semibold">Date</th>
                                    <th class="pb-3 font-semibold">Category</th>
                                    <th class="pb-3 font-semibold">Duration</th>
                                    <th class="pb-3 font-semibold">Timeframe</th>
                                </tr>
                            </thead>
                            <tbody id="logTableBody" class="divide-y divide-gray-800 text-gray-300">
                                </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Set default date picker to today
        document.getElementById('activityDate').value = new Date().toISOString().split('T')[0];

        // Core data structure (Loaded from LocalStorage so data doesn't disappear on refresh)
        let activities = JSON.parse(localStorage.getItem('userActivities')) || [];

        // Helper: Calculate duration in hours between two HH:MM strings
        function calculateHours(start, end) {
            const [sH, sM] = start.split(':').map(Number);
            const [eH, eM] = end.split(':').map(Number);
            let diffMins = (eH * 60 + eM) - (sH * 60 + sM);
            if (diffMins < 0) diffMins += 24 * 60; // Handle overnight shifts if necessary
            return parseFloat((diffMins / 60).toFixed(2));
        }

        // Initialize Chart.js
        const ctx = document.getElementById('activityChart').getContext('2d');
        const activityChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: [], // Dates will go here
                datasets: [
                    { label: 'Run', data: [], backgroundColor: '#2dd4bf' },
                    { label: 'Java', data: [], backgroundColor: '#3b82f6' },
                    { label: 'Aptitude', data: [], backgroundColor: '#a855f7' },
                    { label: 'Reel', data: [], backgroundColor: '#f43f5e' }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    x: { stacked: true, grid: { color: '#374151' }, ticks: { color: '#9ca3af' } },
                    y: { stacked: true, grid: { color: '#374151' }, ticks: { color: '#9ca3af' }, title: { display: true, text: 'Hours Spent', color: '#9ca3af' } }
                },
                plugins: {
                    legend: { labels: { color: '#f3f4f6' } }
                }
            }
        });

        // Update UI (Table & Chart)
        function updateUI() {
            localStorage.setItem('userActivities', JSON.stringify(activities));
            
            // 1. Populate Table (showing last 10 entries)
            const tbody = document.getElementById('logTableBody');
            tbody.innerHTML = '';
            
            // Sort activities by date descending for the log table
            const sortedLogs = [...activities].sort((a, b) => new Date(b.date) - new Date(a.date));
            
            sortedLogs.slice(0, 10).forEach(act => {
                const row = `
                    <tr class="hover:bg-gray-750 transition-colors">
                        <td class="py-3">${act.date}</td>
                        <td class="py-3"><span class="px-2 py-0.5 rounded text-xs font-medium bg-gray-700">${act.category}</span></td>
                        <td class="py-3 font-semibold">${act.duration} hrs</td>
                        <td class="py-3 text-gray-500 text-xs">${act.start} - ${act.end}</td>
                    </tr>
                `;
                tbody.innerHTML += row;
            });

            // 2. Aggregate Data for the Chart (Day-wise breakdown)
            // Extract unique sorted dates
            const uniqueDates = [...new Set(activities.map(a => a.date))].sort((a, b) => new Date(a) - new Date(b));
            
            // Keep only the last 7 unique days for a clean weekly look
            const displayDates = uniqueDates.slice(-7);

            const categories = ['Run', 'Java', 'Aptitude', 'Reel'];
            const chartData = { Run: [], Java: [], Aptitude: [], Reel: [] };

            displayDates.forEach(date => {
                categories.forEach(cat => {
                    const totalHours = activities
                        .filter(a => a.date === date && a.category === cat)
                        .reduce((sum, current) => sum + current.duration, 0);
                    chartData[cat].push(totalHours);
                });
            });

            // Push updated values to chart
            activityChart.data.labels = displayDates;
            activityChart.data.datasets[0].data = chartData['Run'];
            activityChart.data.datasets[1].data = chartData['Java'];
            activityChart.data.datasets[2].data = chartData['Aptitude'];
            activityChart.data.datasets[3].data = chartData['Reel'];
            activityChart.update();
        }

        // Form Submit Handler
        document.getElementById('activityForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const date = document.getElementById('activityDate').value;
            const category = document.getElementById('activityCategory').value;
            const start = document.getElementById('startTime').value;
            const end = document.getElementById('endTime').value;
            const duration = calculateHours(start, end);

            if(duration <= 0) {
                alert("End time must be after the start time!");
                return;
            }

            activities.push({ date, category, start, end, duration });
            updateUI();

            // Reset form time components
            document.getElementById('startTime').value = '';
            document.getElementById('endTime').value = '';
        });

        // Initial paint on load
        updateUI();
    </script>
</body>
</html>
